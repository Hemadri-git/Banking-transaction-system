# =============================================
# APPLICATION CONFIG
# =============================================
spring.application.name=banking-system
server.port=8080

# =============================================
# DATABASE CONFIG — update credentials below
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1233
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT CONFIG
# =============================================
app.jwt.secret=BankingSystemSuperSecretKeyThatIsAtLeast256BitsLong12345678
app.jwt.expiration=86400000

# =============================================
# LOGGING
# =============================================
logging.level.com.banking=DEBUG
logging.level.org.springframework.security=INFO
